<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Be My Bridesmaid</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <p>♡ Letter for You ♡</p>
    </div>

    <div class="popup" id="popup">
        <h1>Please Enter Your Name</h1>
        <input type="text" id="nameInput" class="nameInput" placeholder="Your Name" /> 
        <button id="nameButton" class="nameButton">Submit</button>
    </div>

    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Will you be my Bridesmaid?</h1>

        <img src="ask.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
            <button id="yes-btn" class="btn yes-btn">Yes</button>
            <button id="no-btn" class="btn no-btn">No</button>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          Can't wait to have you as my Bridesmaid!
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
